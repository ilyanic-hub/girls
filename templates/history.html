<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 НАШИ ПОБЕДИТЕЛЬНИЦЫ</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #ff4757;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
        }

        .nav-link:hover { color: var(--accent); }

        h1 { text-align: center; margin-top: 40px; font-size: 2rem; }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .winner-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
            border: 2px solid #ffd700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .winner-card:hover { transform: scale(1.02); }

        .winner-img { width: 100%; height: 340px; object-fit: cover; }

        .winner-info { padding: 15px 10px 0 10px; }

        .winner-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 5px; }

        .winner-date {
            color: #b8860b; font-weight: bold; font-size: 0.95rem;
            background: #fff9db; display: inline-block; padding: 4px 12px; border-radius: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: #fff;
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            padding: 30px;
            position: relative;
            box-sizing: border-box;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 2rem; font-weight: bold; color: #333;
            cursor: pointer;
            z-index: 10;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .album-grid img {
            width: 100%; height: 260px;
            object-fit: cover; border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; 
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000; /* Подняли выше модального окна, чтобы быть на самом переднем плане! */
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 4px;
        }

        .close-lightbox {
            position: absolute;
            top: 20px; right: 25px;
            color: #fff; font-size: 3rem; font-weight: bold;
            cursor: pointer;
            z-index: 2100;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 4rem;
            font-weight: bold;
            cursor: pointer;
            padding: 20px;
            z-index: 2100;
        }

        .arrow-left { left: 20px; }
        .arrow-right { right: 20px; }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">🔥 PHOTO RATING</a>
        <a href="/" class="nav-link">⬅ На главную</a>
    </header>

    <h1>🏆 Зал славы победительниц</h1>
    <p id="status-msg" style="text-align: center; color: var(--text-muted); margin-top: -15px;">Нажмите на карточку, чтобы открыть фотосессию</p>

    <main class="history-grid" id="history-gallery"></main>

    <div id="albumModal" class="modal" onclick="closeAlbum(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="document.getElementById('albumModal').style.display='none'">&times;</span>
            <h2 id="modalTitle" style="margin-top: 0;">Фотосессия</h2>
            <div class="album-grid" id="modalPhotos"></div>
        </div>
    </div>

    <div id="lightboxModal" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
        <span class="nav-arrow arrow-left" onclick="prevPhoto(event)">&#10094;</span>
        <span class="nav-arrow arrow-right" onclick="nextPhoto(event)">&#10095;</span>
        <img id="lightboxImage" class="lightbox-img" src="" onclick="event.stopPropagation()">
    </div>

    <script>
        let currentAlbumPhotos = [];
        let currentPhotoIndex = 0;

        async function loadHistory() {
            try {
                console.log("Начинаю загрузку архива...");
                let res = await fetch('/api/history?nocache=' + new Date().getTime());
                if (!res.ok) throw new Error("Ошибка сервера: " + res.status);
                
                let list = await res.json();
                console.log("Получены данные из API:", list);

                let gallery = document.getElementById('history-gallery');
                gallery.innerHTML = '';

                if (!list || list.length === 0) {
                    document.getElementById('status-msg').innerText = "В архиве пока пусто.";
                    return;
                }

                list.forEach(winner => {
                    // УБРАЛИ ХВОСТИК ?t=... , чтобы не ломать Base64-код картинки!
                    let freshPhotoUrl = winner.photo_url; 
                    
                    gallery.innerHTML += `
                        <div class="winner-card" onclick="openAlbum(${winner.id}, '${winner.name}')">
                            <img src="${freshPhotoUrl}" class="winner-img" onerror="this.src='https://placehold.co/300x340?text=No+Photo'">
                            <div class="winner-info">
                                <div class="winner-name">${winner.name}</div>
                                <div class="winner-date">👑 Победительница: ${winner.title_date}</div>
                            </div>
                        </div>`;
                });
            } catch (err) {
                console.error("Критическая ошибка JS:", err);
                alert("Ошибка при загрузке архива. Проверь консоль (F12)");
            }
        }

        async function openAlbum(winnerId, winnerName) {
            document.getElementById('modalTitle').innerText = `📸 Фотосессия: ${winnerName}`;
            let res = await fetch(`/api/history/${winnerId}/photos?t=` + new Date().getTime());
            currentAlbumPhotos = await res.json();
            
            let photosDiv = document.getElementById('modalPhotos');
            photosDiv.innerHTML = '';

            if (currentAlbumPhotos.length === 0) {
                photosDiv.innerHTML = '<p style="color: var(--text-muted)">Альбом пуст.</p>';
            } else {
                currentAlbumPhotos.forEach((url, index) => {
                    // ИСПРАВЛЕНО: Убрали хвостик ?t=..., чтобы не ломать Base64 альбома
                    photosDiv.innerHTML += `<img src="${url}" alt="Фото" onclick="openLightbox(${index})">`;
                });
            }
            document.getElementById('albumModal').style.display = 'flex';
        }

        function closeAlbum(event) { document.getElementById('albumModal').style.display = 'none'; }

        function updateLightboxImage() {
            let lightboxImg = document.getElementById('lightboxImage');
            // ИСПРАВЛЕНО: Убрали хвостик ?t=... и здесь
            lightboxImg.src = currentAlbumPhotos[currentPhotoIndex];
        }

        function updateLightboxImage() {
            let lightboxImg = document.getElementById('lightboxImage');
            lightboxImg.src = currentAlbumPhotos[currentPhotoIndex] + '?t=' + new Date().getTime();
        }

        function nextPhoto(event) {
            if (event) event.stopPropagation();
            currentPhotoIndex = (currentPhotoIndex + 1) % currentAlbumPhotos.length;
            updateLightboxImage();
        }

        function prevPhoto(event) {
            if (event) event.stopPropagation();
            currentPhotoIndex = (currentPhotoIndex - 1 + currentAlbumPhotos.length) % currentAlbumPhotos.length;
            updateLightboxImage();
        }

        function openLightbox(index) {
            console.log("Открываю фото на весь экран, индекс:", index);
            currentPhotoIndex = index;
            updateLightboxImage();
            
            // Находим наш лайтбокс и принудительно выводим на самый передний план
            let lightbox = document.getElementById('lightboxModal');
            lightbox.style.display = 'flex';
        }

        function closeLightbox() { 
            document.getElementById('lightboxModal').style.display = 'none'; 
        }

        document.addEventListener('keydown', function(e) {
            if (document.getElementById('lightboxModal').style.display === 'flex') {
                if (e.key === 'ArrowRight') nextPhoto();
                if (e.key === 'ArrowLeft') prevPhoto();
                if (e.key === 'Escape') closeLightbox();
            }
        });

        // Запуск
        loadHistory();
    </script>
</body>
</html>
