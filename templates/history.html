<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 НАШИ ПОБЕДИТЕЛЬНИЦЫ</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #ff4757;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
        }

        .nav-link:hover { color: var(--accent); }

        h1 { text-align: center; margin-top: 40px; font-size: 2rem; }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .winner-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
            border: 2px solid #ffd700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .winner-card:hover {
            transform: scale(1.02);
        }

        .winner-img { width: 100%; height: 340px; object-fit: cover; }

        .winner-info { padding: 15px 10px 0 10px; }

        .winner-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 5px; }

        .winner-date {
            color: #b8860b; font-weight: bold; font-size: 0.95rem;
            background: #fff9db; display: inline-block; padding: 4px 12px; border-radius: 15px;
        }

        /* --- ОКНО №1: АЛЬБОМ ФОТОСЕССИИ --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: #fff;
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            padding: 30px;
            position: relative;
            box-sizing: border-box;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 2rem; font-weight: bold; color: #333;
            cursor: pointer;
            z-index: 10;
        }

        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .album-grid img {
            width: 100%; height: 260px;
            object-fit: cover; border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .album-grid img:hover {
            opacity: 0.85;
        }

        /* --- ОКНО №2: ОДНО ФОТО НА ВЕСЬ ЭКРАН (LIGHTBOX) --- */
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000; /* Выше, чем обычное модальное окно */
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .lightbox-img {
            max-width: 95%;
            max-height: 95vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            cursor: default;
        }

        .lightbox .close-lightbox {
            position: absolute;
            top: 20px; right: 25px;
            color: #fff; font-size: 3rem; font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">🔥 PHOTO RATING</a>
        <a href="/" class="nav-link">⬅ На главную</a>
    </header>

    <h1>🏆 Зал славы победительниц</h1>
    <p style="text-align: center; color: var(--text-muted); margin-top: -15px;">Нажмите на карточку, чтобы открыть фотосессию</p>

    <main class="history-grid" id="history-gallery"></main>

    <div id="albumModal" class="modal" onclick="closeAlbum(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="document.getElementById('albumModal').style.display='none'">&times;</span>
            <h2 id="modalTitle" style="margin-top: 0;">Фотосессия</h2>
            <div class="album-grid" id="modalPhotos"></div>
        </div>
    </div>

    <div id="lightboxModal" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="lightboxImage" class="lightbox-img" src="" onclick="event.stopPropagation()">
    </div>

    <script>
        async function loadHistory() {
            let res = await fetch('/api/history');
            if (!res.ok) return;
            let list = await res.json();
            let gallery = document.getElementById('history-gallery');
            gallery.innerHTML = '';

            list.forEach(winner => {
                gallery.innerHTML += `
                    <div class="winner-card" onclick="openAlbum(${winner.id}, '${winner.name}')">
                        <img src="${winner.photo_url}" class="winner-img">
                        <div class="winner-info">
                            <div class="winner-name">${winner.name}</div>
                            <div class="winner-date">👑 Победительница: ${winner.title_date}</div>
                        </div>
                    </div>`;
            });
        }

        async function openAlbum(winnerId, winnerName) {
            document.getElementById('modalTitle').innerText = `📸 Фотосессия: ${winnerName}`;
            let res = await fetch(`/api/history/${winnerId}/photos`);
            let photos = await res.json();
            
            let photosDiv = document.getElementById('modalPhotos');
            photosDiv.innerHTML = '';

            if (photos.length === 0) {
                photosDiv.innerHTML = '<p style="color: var(--text-muted)">Для этой победительницы альбом еще не загружен.</p>';
            } else {
                photos.forEach(url => {
                    // Добавили событие onclick для открытия фото во весь экран
                    photosDiv.innerHTML += `<img src="${url}" alt="Фото" onclick="openLightbox('${url}')">`;
                });
            }
            document.getElementById('albumModal').style.display = 'flex';
        }

        function closeAlbum(event) {
            document.getElementById('albumModal').style.display = 'none';
        }

        // ФУНКЦИИ ДЛЯ РАБОТЫ С ФОТО НА ВЕСЬ ЭКРАН
        function openLightbox(url) {
            let lightbox = document.getElementById('lightboxModal');
            let lightboxImg = document.getElementById('lightboxImage');
            lightboxImg.src = url;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightboxModal').style.display = 'none';
        }

        loadHistory();
    </script>
</body>
</html>
