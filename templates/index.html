<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 PHOTO RATING</title>
    <style>
        :root { --bg: #0f0f12; --card: #1e1e24; --accent: #ff3366; --text: #ffffff; --sec: #8a8a93; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--card); border-radius: 12px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: var(--accent); text-decoration: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-sec { background: #3a3a4a; margin-left: 5px; }
        .auth-box { background: var(--card); max-width: 350px; margin: 100px auto; padding: 30px; border-radius: 16px; text-align: center; }
        .auth-box input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #3a3a4a; background: #121216; color: white; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 16px; overflow: hidden; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .card-img { width: 100%; height: 350px; object-fit: cover; background: #2c2c35; }
        .card-content { padding: 20px; }
    </style>
</head>
<body>

    <div id="auth-page" style="display: none;">
        <div class="auth-box">
            <h2 id="auth-title">Вход в аккаунт</h2>
            <input type="text" id="username" placeholder="Логин">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn" style="width: 96%;" onclick="submitAuth()">Продолжить</button>
            <p style="color: var(--sec); cursor: pointer; margin-top: 15px;" onclick="toggleAuthMode()" id="auth-toggle-text">Нет аккаунта? Зарегистрироваться</p>
        </div>
    </div>

    <div id="main-page" style="display: none;">
        <header>
            <a href="/" class="logo">🔥 PHOTO RATING</a>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="admin-link" style="display:none;"><a href="/admin" style="color: #00ffcc;">В админку ➡️</a></span>
                <div>Привет, <b id="user-name">Гость</b>! Баланс: <span id="user-balance" style="color: var(--accent); font-weight:bold;">0</span> ₽</div>
                <button class="btn btn-sec" onclick="depositMoney()">+ Пополнить</button>
                <button class="btn btn-sec" onclick="logout()">Выйти</button>
            </div>
        </header>
        <main class="gallery" id="gallery"></main>
    </div>

    <script>
        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Вход в аккаунт" : "Регистрация";
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
        }

        async function checkAuth() {
            let res = await fetch('/api/me');
            if (res.ok) {
                let user = await res.json();
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('main-page').style.display = 'block';
                document.getElementById('user-name').innerText = user.username;
                document.getElementById('user-balance').innerText = user.balance;
                if(user.is_admin) document.getElementById('admin-link').style.display = 'inline';
                loadContestants();
            } else {
                document.getElementById('main-page').style.display = 'none';
                document.getElementById('auth-page').style.display = 'block';
            }
        }

        async function submitAuth() {
            let u = document.getElementById('username').value;
            let p = document.getElementById('password').value;
            let url = isLoginMode ? '/api/login' : '/api/register';

            let res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            let data = await res.json();
            if (res.ok) {
                if (!isLoginMode) { alert("Регистрация успешна! Теперь войдите."); toggleAuthMode(); }
                else { checkAuth(); }
            } else { alert("Ошибка: " + data.detail); }
        }

        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            checkAuth();
        }

        async function loadContestants() {
            let res = await fetch('/api/contestants');
            let list = await res.json();
            let g = document.getElementById('gallery');
            g.innerHTML = '';
            list.forEach(girl => {
                g.innerHTML += `
                    <div class="card">
                        <img src="${girl.photo_url}" class="card-img" onerror="this.src='https://placehold.co/300x350/2c2c35/ffffff?text=${girl.name}'">
                        <div class="card-content">
                            <h3>${girl.name}</h3>
                            <p style="color: var(--sec)">Голосов: <span style="color:var(--accent); font-weight:bold">${girl.votes_count}</span></p>
                            <button class="btn" onclick="vote(${girl.id})">Проголосовать (10₽)</button>
                        </div>
                    </div>`;
            });
        }

        async function vote(id) {
            // Передаем параметр contestant_id через query-строку, как прописано в бэкенде
            let res = await fetch(`/api/vote?contestant_id=${id}`, {method: 'POST'});
            if (res.ok) { 
                checkAuth(); 
            } else { 
                let d = await res.json(); 
                alert(d.detail || "Ошибка при голосовании"); 
            }
        }

        async function depositMoney() {
            let amt = prompt("Сумма пополнения (₽):", "100");
            if(!amt || isNaN(amt) || amt <= 0) return;
            
            try {
                // Отправляем POST-запрос с JSON в теле запроса
                let res = await fetch('/api/deposit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ amount: parseFloat(amt) })
                });
                
                let data = await res.json();
                
                if (res.ok && data.payment_url) {
                    // Перенаправляем пользователя на платежную форму BetaTransfer
                    window.location.href = data.payment_url;
                } else {
                    alert("Ошибка создания платежа: " + (data.detail || "Неизвестная ошибка"));
                }
            } catch (err) {
                console.error(err);
                alert("Не удалось связаться с сервером оплаты");
            }
        }

        checkAuth();
    </script>
</body>
</html>
