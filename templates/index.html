<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 PHOTO RATING</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent: #ff4757;
            --accent-hover: #e84118;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* --- ШАПКА САЙТА --- */
        header {
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        /* --- СЕТКА ДЛЯ ФОТОГРАФИЙ --- */
        .contestants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        

        /* --- КАРТОЧКА УЧАСТНИЦЫ --- */
        .contestant-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .contestant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .contestant-img {
            width: 100%;
            height: 340px;
            object-fit: cover;
            object-position: center;
            border-bottom: 1px solid #edf2f7;
        }

        .contestant-info {
            padding: 15px 10px 0 10px;
        }

        .contestant-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: var(--text-main);
        }

        .contestant-votes {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        /* --- УНИВЕРСАЛЬНЫЕ КНОПКИ --- */
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-sec {
            background: #edf2f7;
            color: var(--text-main);
        }

        .btn-sec:hover {
            background: #e2e8f0;
        }

        /* --- ОКНО АВТОРИЗАЦИИ --- */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .auth-box h2 {
            margin-bottom: 25px;
            font-weight: 800;
        }

        .auth-box input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            background: #f7fafc;
        }

        .auth-box input:focus {
            border-color: var(--accent);
            background: #fff;
        }

        /* Стили для окна пополнения */
.deposit-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: 2000;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
}
.deposit-modal-content {
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}
.deposit-close {
    position: absolute;
    top: 15px; right: 20px;
    font-size: 24px; font-weight: bold; color: #a0aec0;
    cursor: pointer;
}
.deposit-close:hover { color: #4a5568; }
.deposit-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}
.deposit-opt-btn {
    background: #f7fafc;
    border: 2px solid #e2e8f0;
    padding: 12px 5px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}
.deposit-opt-btn:hover {
    border-color: #00bcd4;
    background: #e6fffa;
}
.deposit-opt-btn.active {
    border-color: #00bcd4;
    background: #00bcd4;
    color: white;
}
.deposit-opt-btn.active small { color: #e6fffa; }
.btn-pay-submit {
    background: #2ed573;
    color: white;
    border: none;
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.2s;
}
.btn-pay-submit:hover { background: #26af5f; }
    </style>
</head>
<body>

    <div id="auth-page" class="auth-container" style="display: none;">
        <div class="auth-box">
            <h2 id="auth-title">Вход в аккаунт</h2>
            <input type="text" id="username" placeholder="Логин">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn" style="width: 100%; margin-top: 10px;" onclick="submitAuth()">Продолжить</button>
            <p style="color: var(--text-muted); cursor: pointer; margin-top: 20px; font-size: 0.9rem;" onclick="toggleAuthMode()" id="auth-toggle-text">Нет аккаунта? Зарегистрироваться</p>
        </div>
    </div>

    <div id="main-page" style="display: none;">
        <header>
            <a href="/" class="logo">🔥 PHOTO RATING</a>
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="/history" style="color: #b8860b; font-weight: bold; text-decoration: none; margin-right: 15px;">🏆 Зал славы</a>
                
                <span id="admin-link" style="display:none;"><a href="/admin" style="color: var(--accent); font-weight: bold; text-decoration: none; margin-right: 10px;">Админ-панель ➡️</a></span>
                <div style="font-size: 1rem;">Привет, <b id="user-name" style="color: var(--accent);">Гость</b>! Баланс: <span id="user-balance" style="font-weight:bold;">0</span> ₽</div>
                <button class="..." onclick="openDepositModal()">+ Пополнить</button>
                <button class="btn btn-sec" onclick="logout()">Выйти</button>
            </div>
        </header>
        
        <main class="contestants-grid" id="gallery"></main>
    </div>

    <script>
        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Вход в аккаунт" : "Регистрация";
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
        }

        async function checkAuth() {
            let res = await fetch('/api/me');
            if (res.ok) {
                let user = await res.json();
                
                // ИСПРАВЛЕНО: Если бэкенд отдал "Гостя", перенаправляем на форму логина
                if (!user.username || user.username === "Гость") {
                    document.getElementById('main-page').style.display = 'none';
                    document.getElementById('auth-page').style.display = 'flex';
                    return;
                }

                // Если это реальный залогиненный пользователь:
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('main-page').style.display = 'block';
                document.getElementById('user-name').innerText = user.username;
                document.getElementById('user-balance').innerText = user.balance;
                
                if(user.is_admin === 1) {
                    document.getElementById('admin-link').style.display = 'inline';
                } else {
                    document.getElementById('admin-link').style.display = 'none';
                }
                loadContestants();
            } else {
                document.getElementById('main-page').style.display = 'none';
                document.getElementById('auth-page').style.display = 'flex';
            }
        }

        async function submitAuth() {
            let u = document.getElementById('username').value;
            let p = document.getElementById('password').value;
            let url = isLoginMode ? '/api/login' : '/api/register';

            let res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            let data = await res.json();
            if (res.ok) {
                if (!isLoginMode) { 
                    alert("Регистрация успешна! Теперь войдите."); 
                    toggleAuthMode(); 
                } else { 
                    window.location.reload(); 
                }
            } else { 
                alert("Ошибка: " + data.detail); 
            }
        }

        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            window.location.href = '/';
        }

        async function loadContestants() {
            let res = await fetch('/api/contestants');
            let list = await res.json();
            let g = document.getElementById('gallery');
            g.innerHTML = '';
            
            list.forEach(girl => {
                g.innerHTML += `
                    <div class="contestant-card">
                        <img src="${girl.photo_url}" class="contestant-img" onerror="this.src='https://placehold.co/300x350/2c2c35/ffffff?text=${girl.name}'">
                        <div class="contestant-info">
                            <div class="contestant-name">${girl.name}</div>
                            <div class="contestant-votes">Голосов: <span style="color:var(--accent); font-weight:bold">${girl.votes_count}</span></div>
                            <button class="btn" onclick="vote(${girl.id})">Проголосовать (10₽)</button>
                        </div>
                    </div>`;
            });
        }

        async function vote(id) {
            let res = await fetch(`/api/vote?contestant_id=${id}`, {method: 'POST'});
            if (res.ok) { 
                checkAuth(); 
            } else { 
                let d = await res.json(); 
                alert(d.detail || "Ошибка при голосовании"); 
            }
        }

        async function depositMoney() {
            let amt = prompt("Сумма пополнения (₽):", "100");
            if(!amt || isNaN(amt) || amt <= 0) return;
            
            try {
                let res = await fetch('/api/deposit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: parseFloat(amt) })
                });
                
                let data = await res.json();
                
                if (res.ok && data.payment_url) {
                    window.location.href = data.payment_url;
                } else {
                    alert("Ошибка создания платежа: " + (data.detail || "Неизвестная ошибка"));
                }
            } catch (err) {
                console.error(err);
                alert("Не удалось связаться с сервером оплаты");
            }
        }

        checkAuth();
    </script>

    <div id="depositModal" class="deposit-modal" onclick="closeDepositModal()">
    <div class="deposit-modal-content" onclick="event.stopPropagation()">
        <span class="deposit-close" onclick="closeDepositModal()">&times;</span>
        <h2>💎 Пополнение баланса</h2>
        <p style="color: #718096; margin-bottom: 20px;">Выберите количество коинов для покупки:</p>
        
        <div class="deposit-options">
            <button class="deposit-opt-btn" onclick="selectDepositAmount(100)">100 коинов <br><small>10 ₽</small></button>
            <button class="deposit-opt-btn" onclick="selectDepositAmount(500)">500 коинов <br><small>50 ₽</small></button>
            <button class="deposit-opt-btn" onclick="selectDepositAmount(1000)">1000 коинов <br><small>100 ₽</small></button>
        </div>

        <div style="margin-top: 20px;">
            <label style="display:block; text-align:left; margin-bottom:5px; font-weight:bold; color:#4a5568;">Своя сумма (в коинах):</label>
            <input type="number" id="customAmount" placeholder="Минимум 100" min="100" style="width:100%; padding:10px; border:1px solid #cbd5e0; border-radius:8px; font-size:16px;">
        </div>

        <button id="payBtn" class="btn-pay-submit" onclick="sendPaymentRequest()">Перейти к оплате криптой</button>
    </div>
</div>
</body>
</html>
